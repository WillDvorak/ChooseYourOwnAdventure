services:
  db:
    image: mysql:8.0
    container_name: textquest-mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: textquest
    ports:
      # If 3306 is busy on your Mac, change to "3307:3306"
      - "3306:3306"
    volumes:
      # Mount your SQL folder so MySQL runs V1__schema.sql and V2__seed.sql on first start
      - ./sql:/docker-entrypoint-initdb.d:ro
    command: ["--default-authentication-plugin=mysql_native_password"]
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-prootpass"]
      interval: 5s
      timeout: 3s
      retries: 10
