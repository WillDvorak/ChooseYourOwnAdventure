stages:
  - test

# Backend job: runs Spring Boot tests against a MySQL service
backend:
  stage: test
  image: gradle:7-jdk17
  services:
    - name: mysql:8.0
      alias: mysql
  variables:
    MYSQL_ROOT_PASSWORD: rootpassword
    MYSQL_DATABASE: textquest
    SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/textquest
    SPRING_DATASOURCE_USERNAME: root
    SPRING_DATASOURCE_PASSWORD: rootpassword
  before_script:
    - cd api
  script:
    - chmod +x gradlew
    - ./gradlew test --no-daemon
  cache:
    paths:
      - api/.gradle/

# Frontend job: lints and builds the React application
frontend:
  stage: test
  image: node:20
  before_script:
    - cd ReactFrontend/ChooseYourOwnAdventure
    - npm ci
  script:
    - npm run lint
    - npm run build
  cache:
    paths:
      - ReactFrontend/ChooseYourOwnAdventure/node_modules/

# Demo job: always passes to show a successful CI job
demo-pass:
  stage: test
  image: alpine:latest
  script: "echo 'Demo CI job: this always passes.'"

# Demo job: always fails to show CI catching errors
demo-fail:
  stage: test
  image: alpine:latest
  script: "echo 'Demo CI job: this is supposed to fail.' && exit 1"
