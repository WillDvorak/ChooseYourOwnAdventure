stages:
  - test

backend:
  stage: test
  image: gradle:7-jdk17
  services:
    - name: mysql:8.0
      alias: mysql
  variables:
    MYSQL_ROOT_PASSWORD: rootpassword
    MYSQL_DATABASE: textquest
    SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/textquest
    SPRING_DATASOURCE_USERNAME: root
    SPRING_DATASOURCE_PASSWORD: rootpassword
  before_script:
    - cd api
  script:
    - chmod +x gradlew
    - ./gradlew test --no-daemon
  cache:
    paths:
      - api/.gradle/

frontend:
  stage: test
  image: node:20
  before_script:
    - cd ReactFrontend/ChooseYourOwnAdventure
    - npm ci
  script:
    - npm run lint
    - npm test
    - npm run build
  cache:
    paths:
      - ReactFrontend/ChooseYourOwnAdventure/node_modules/

